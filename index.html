<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KeyPulse Nexus // SYSTEM</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: "Courier New", monospace;
  color: #00ff9d;
}

/* MATRIX CANVAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* MAIN TERMINAL */
.terminal {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  width: 750px;
  background: rgba(0,0,0,0.8);
  border: 1px solid #00ff9d;
  box-shadow: 0 0 40px #00ff9d;
  padding: 25px;
  z-index: 2;
  animation: flicker 2s infinite;
}

/* flicker effect */
@keyframes flicker {
  0% { opacity: 1; }
  50% { opacity: 0.85; }
  100% { opacity: 1; }
}

/* GLITCH TITLE */
h1 {
  text-align: center;
  font-size: 34px;
  text-shadow: 0 0 10px #00ff9d;
  animation: glitch 1.2s infinite;
}

@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(-2px,2px); }
  40% { transform: translate(2px,-2px); }
  60% { transform: translate(-1px,1px); }
  80% { transform: translate(1px,-1px); }
  100% { transform: translate(0); }
}

/* TEXT AREA */
#text {
  white-space: pre-line;
  font-size: 14px;
  line-height: 1.6;
  color: #aaffcc;
  min-height: 180px;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 25px;
  background: #00ff9d;
  color: black;
  text-decoration: none;
  font-weight: bold;
  border-radius: 5px;
  transition: 0.3s;
}

.btn:hover {
  background: black;
  color: #00ff9d;
  border: 1px solid #00ff9d;
  box-shadow: 0 0 20px #00ff9d;
}

/* SCAN BAR */
.scan {
  margin-top: 15px;
  height: 6px;
  width: 100%;
  background: #111;
  border: 1px solid #00ff9d;
  overflow: hidden;
}

.scan::before {
  content: "";
  display: block;
  height: 100%;
  width: 40%;
  background: #00ff9d;
  animation: scanMove 2s infinite;
}

@keyframes scanMove {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(250%); }
}

.small {
  margin-top: 10px;
  font-size: 11px;
  color: #66ffcc;
  text-align: center;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="terminal">

<h1>KEYPULSE NEXUS</h1>

<div id="text"></div>

<div class="scan"></div>

<a class="btn"
href="https://github.com/Romaissaa4/KeyPulseNexus/releases/latest/download/KeyPulseNexus.exe"
target="_blank">
DOWNLOAD PAYLOAD
</a>

<div class="small">
SYSTEM STATUS: SAFE SIMULATION • LOCAL ANALYSIS ONLY
</div>

</div>

<script>

/* MATRIX EFFECT */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&*";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width / fontSize;
let drops = Array(columns).fill(1);

function drawMatrix() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ff9d";
  ctx.font = fontSize + "px monospace";

  for(let i=0;i<drops.length;i++){
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random() > 0.975){
      drops[i]=0;
    }
    drops[i]++;
  }
}

setInterval(drawMatrix,33);

/* TYPING EFFECT */
const lines = [
"> Initializing KeyPulse Nexus...",
"> Loading secure sandbox environment...",
"> Monitoring local keyboard input only...",
"> Building frequency analysis engine...",
"> SYSTEM READY ✔"
];

let i = 0;
let j = 0;
let current = "";
const speed = 40;

function type(){
  if(i < lines.length){
    if(j < lines[i].length){
      current += lines[i][j];
      document.getElementById("text").innerHTML = current + "_";
      j++;
      setTimeout(type,speed);
    } else {
      current += "\n";
      i++;
      j = 0;
      setTimeout(type,500);
    }
  } else {
    document.getElementById("text").innerHTML = current;
  }
}

type();

</script>

</body>
</html>
